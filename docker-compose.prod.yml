services:
  backend:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER}/2gether-backend:${TAG:-latest}
    container_name: 2gether-backend
    restart: unless-stopped
    environment:
      PORT: 8080
      DB_PATH: /data/2gether.db
      JWT_SECRET: ${JWT_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_REDIRECT_URL: ${GOOGLE_REDIRECT_URL}
      FRONTEND_URL: ${FRONTEND_URL}
    volumes:
      - sqlite_data:/data
    networks:
      - 2gether

  frontend:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER}/2gether-frontend:${TAG:-latest}
    container_name: 2gether-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - 2gether

volumes:
  sqlite_data:

networks:
  2gether:
    driver: bridge
