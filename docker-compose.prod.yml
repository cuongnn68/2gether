services:
  backend:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER}/worktrack-backend:${TAG:-latest}
    container_name: worktrack-backend
    restart: unless-stopped
    environment:
      PORT: 8080
      DB_PATH: /data/worktrack.db
      JWT_SECRET: ${JWT_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_REDIRECT_URL: ${GOOGLE_REDIRECT_URL}
      FRONTEND_URL: ${FRONTEND_URL}
    volumes:
      - sqlite_data:/data
    networks:
      - worktrack

  frontend:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER}/worktrack-frontend:${TAG:-latest}
    container_name: worktrack-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - worktrack

volumes:
  sqlite_data:

networks:
  worktrack:
    driver: bridge
