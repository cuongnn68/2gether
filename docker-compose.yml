services:
  backend:
    build: ./backend
    container_name: worktrack-backend
    restart: unless-stopped
    environment:
      PORT: 8080
      DB_PATH: /data/worktrack.db
      JWT_SECRET: ${JWT_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_REDIRECT_URL: ${GOOGLE_REDIRECT_URL:-http://localhost/api/auth/google/callback}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
    volumes:
      - sqlite_data:/data
    networks:
      - worktrack

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ""
    container_name: worktrack-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - worktrack

volumes:
  sqlite_data:

networks:
  worktrack:
    driver: bridge
